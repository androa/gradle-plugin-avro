name: Tests

on:
  push:
    branches:
      - main
      - dependabot/**

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/wrapper-validation@v6
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew test